name: Daily Web Company Run - TN West Small Batch

on:
  schedule:
    - cron: "15 14 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    uses: ./.github/workflows/_web-company-run-reusable.yml
    with:
      run_name: "Daily Web Company Run - TN West Small Batch"
      trigger_name: "github_actions_tn_west_small_batch"
      active_state: "TN"
      active_pack: "home_services"
      active_market_slugs: "memphis-tn,jackson-tn,bartlett-tn,smyrna-tn,cookeville-tn"
      active_max_query_pairs: "45"
      expansion_limit: "30"
      contact_limit: "75"
      artifact_name: "tn-west-small-batch-web-company-run-artifacts"
    secrets: inherit