name: Reusable Web Company Run

on:
  workflow_call:
    inputs:
      run_name:
        required: true
        type: string
      trigger_name:
        required: true
        type: string
      active_state:
        required: false
        type: string
        default: ""
      active_pack:
        required: true
        type: string
      active_market_slugs:
        required: true
        type: string
      active_max_query_pairs:
        required: true
        type: string
      expansion_limit:
        required: true
        type: string
      contact_limit:
        required: true
        type: string
      artifact_name:
        required: true
        type: string

concurrency:
  group: web-company-run-small-batches
  cancel-in-progress: false

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_ENV: production

  ACTIVE_MODE: registry
  ACTIVE_STATE: ${{ inputs.active_state }}
  ACTIVE_PACK: ${{ inputs.active_pack }}
  ACTIVE_MARKET_SLUGS: ${{ inputs.active_market_slugs }}
  ACTIVE_MAX_QUERY_PAIRS: ${{ inputs.active_max_query_pairs }}

  SUPABASE_POSTGRES_URL: ${{ secrets.SUPABASE_POSTGRES_URL }}
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGODB_DB: ${{ secrets.MONGODB_DB }}

jobs:
  run:
    name: ${{ inputs.run_name }}
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Checkout PDB-pipeline
        uses: actions/checkout@v4
        with:
          path: pdb-pipeline
          fetch-depth: 1

      - name: Validate workflow configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${{ vars.PDB_ETL_REPOSITORY }}" ]; then
            echo "::error::Missing repository variable PDB_ETL_REPOSITORY"
            missing=1
          fi

          if [ -z "${{ secrets.PDB_REPO_PAT }}" ]; then
            echo "::error::Missing secret PDB_REPO_PAT"
            missing=1
          fi

          if [ -z "${SUPABASE_POSTGRES_URL:-}" ]; then
            echo "::error::Missing secret SUPABASE_POSTGRES_URL"
            missing=1
          fi

          if [ -z "${MONGODB_URI:-}" ]; then
            echo "::error::Missing secret MONGODB_URI"
            missing=1
          fi

          if [ -z "${MONGODB_DB:-}" ]; then
            echo "::error::Missing secret MONGODB_DB"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Debug run configuration
        shell: bash
        run: |
          echo "Run name=${{ inputs.run_name }}"
          echo "Trigger=${{ inputs.trigger_name }}"
          echo "PDB_ETL_REPOSITORY=${{ vars.PDB_ETL_REPOSITORY }}"
          echo "ACTIVE_MODE=${ACTIVE_MODE}"
          echo "ACTIVE_STATE=${ACTIVE_STATE}"
          echo "ACTIVE_PACK=${ACTIVE_PACK}"
          echo "ACTIVE_MARKET_SLUGS=${ACTIVE_MARKET_SLUGS}"
          echo "ACTIVE_MAX_QUERY_PAIRS=${ACTIVE_MAX_QUERY_PAIRS}"
          echo "EXPANSION_LIMIT=${{ inputs.expansion_limit }}"
          echo "CONTACT_LIMIT=${{ inputs.contact_limit }}"

      - name: Preflight check ETL repo access
        shell: bash
        run: |
          set -euo pipefail

          status=$(curl -s -o /tmp/repo_check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.PDB_REPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ vars.PDB_ETL_REPOSITORY }}")

          echo "GitHub API repo check HTTP status: $status"

          if [ "$status" != "200" ]; then
            echo "::error::PAT cannot access repo ${{ vars.PDB_ETL_REPOSITORY }}"
            cat /tmp/repo_check.json
            exit 1
          fi

      - name: Checkout PDB-etl
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PDB_ETL_REPOSITORY }}
          token: ${{ secrets.PDB_REPO_PAT }}
          path: pdb-etl
          fetch-depth: 1

      - name: Verify checkouts
        shell: bash
        run: |
          set -euo pipefail
          pwd
          ls -la
          echo "--- pdb-pipeline ---"
          ls -la pdb-pipeline
          echo "--- pdb-etl ---"
          ls -la pdb-etl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r pdb-pipeline/requirements.txt
          pip install -r pdb-etl/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Emergency Mongo raw quota cleanup
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import os
          from pymongo import MongoClient

          uri = os.environ["MONGODB_URI"]
          db_name = os.environ["MONGODB_DB"]

          client = MongoClient(uri)
          db = client[db_name]

          collections = [
              "raw_businesses",
              "raw_company_expansions",
              "raw_company_entity_expansion",
          ]

          for name in collections:
              if name in db.list_collection_names():
                  result = db[name].delete_many({})
                  print(f"{name}: deleted {result.deleted_count}")
              else:
                  print(f"{name}: not found")

          client.close()
          PY

      - name: Run web/company orchestrator
        shell: bash
        working-directory: pdb-pipeline
        run: |
          set -euo pipefail

          python -u -m runners.run_web_company_end_to_end \
            --trigger "${{ inputs.trigger_name }}" \
            --expansion-limit "${{ inputs.expansion_limit }}" \
            --contact-limit "${{ inputs.contact_limit }}" \
            --raw-retention-mode archive-then-purge \
            --raw-archive-dir artifacts/raw_archives \
            --metrics-json-out web_run_metrics.json | tee web_run.log

      - name: Build run summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          metrics_path = Path("pdb-pipeline/web_run_metrics.json")

          with open(summary_path, "a", encoding="utf-8") as out:
              out.write("## ${{ inputs.run_name }}\n\n")
              out.write(f"- Active mode: `{os.environ.get('ACTIVE_MODE')}`\n")
              out.write(f"- Active state: `{os.environ.get('ACTIVE_STATE')}`\n")
              out.write(f"- Active pack: `{os.environ.get('ACTIVE_PACK')}`\n")
              out.write(f"- Active markets: `{os.environ.get('ACTIVE_MARKET_SLUGS')}`\n")
              out.write(f"- Max query pairs: `{os.environ.get('ACTIVE_MAX_QUERY_PAIRS')}`\n")

              if not metrics_path.exists():
                  out.write("\nNo metrics file was produced.\n")
                  raise SystemExit(0)

              data = json.loads(metrics_path.read_text(encoding="utf-8"))

              out.write(f"- Run ID: `{data.get('run_id')}`\n")
              out.write(f"- Dataset ID: `{data.get('dataset_id')}`\n")
              out.write(f"- Status: `{data.get('status')}`\n")
              out.write(f"- Raw records ingested: `{data.get('raw_records_ingested')}`\n")
              out.write(f"- Companies seeded: `{data.get('companies_seeded')}`\n")
              out.write(f"- Companies enriched: `{data.get('companies_enriched')}`\n")
              out.write(f"- Contacts found: `{data.get('contacts_found')}`\n")
              out.write(f"- Leads inserted: `{data.get('leads_inserted')}`\n")
              out.write(f"- Sellable leads inserted: `{data.get('sellable_leads_inserted')}`\n")
              out.write(f"- Premium leads inserted: `{data.get('premium_leads_inserted')}`\n")
              out.write(f"- Total elapsed seconds: `{data.get('elapsed_seconds_total')}`\n")

              raw_retention = data.get("raw_retention") or {}
              if raw_retention:
                  out.write(f"- Raw retention mode: `{raw_retention.get('mode')}`\n")
                  out.write(f"- Raw retention status: `{raw_retention.get('status')}`\n")

                  archive = raw_retention.get("archive") or {}
                  purge = raw_retention.get("purge") or {}

                  if archive:
                      out.write(f"- Archived raw docs: `{archive.get('total_written')}`\n")

                  if purge:
                      out.write(f"- Purged raw docs: `{purge.get('deleted_total')}`\n")

              out.write("\n")
          PY

      - name: Enforce alert conditions
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          from pathlib import Path

          metrics_path = Path("pdb-pipeline/web_run_metrics.json")
          if not metrics_path.exists():
              raise SystemExit("pdb-pipeline/web_run_metrics.json was not created")

          data = json.loads(metrics_path.read_text(encoding="utf-8"))

          if str(data.get("status")).lower() != "completed":
              raise SystemExit(f"Run status is not completed: {data.get('status')}")
          PY

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          if-no-files-found: ignore
          path: |
            pdb-pipeline/web_run.log
            pdb-pipeline/web_run_metrics.json
            pdb-pipeline/artifacts/raw_archives