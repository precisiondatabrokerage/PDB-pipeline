name: Daily Web Company Run

on:
  schedule:
    - cron: "15 13 * * *"
  workflow_dispatch:

concurrency:
  group: daily-web-company-run
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_ENV: production
  SUPABASE_POSTGRES_URL: ${{ secrets.SUPABASE_POSTGRES_URL }}
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGODB_DB: ${{ secrets.MONGODB_DB }}
  WEB_EXPANSION_LIMIT: ${{ vars.WEB_EXPANSION_LIMIT }}
  WEB_CONTACT_LIMIT: ${{ vars.WEB_CONTACT_LIMIT }}

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout PDB-pipeline
        uses: actions/checkout@v4
        with:
          path: pdb-pipeline
          fetch-depth: 1

      - name: Validate workflow configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${{ vars.PDB_ETL_REPOSITORY }}" ]; then
            echo "::error::Missing repository variable PDB_ETL_REPOSITORY"
            missing=1
          fi

          if [ -z "${{ secrets.PDB_REPO_PAT }}" ]; then
            echo "::error::Missing secret PDB_REPO_PAT"
            missing=1
          fi

          if [ -z "${SUPABASE_POSTGRES_URL:-}" ]; then
            echo "::error::Missing secret SUPABASE_POSTGRES_URL"
            missing=1
          fi

          if [ -z "${MONGODB_URI:-}" ]; then
            echo "::error::Missing secret MONGODB_URI"
            missing=1
          fi

          if [ -z "${MONGODB_DB:-}" ]; then
            echo "::error::Missing secret MONGODB_DB"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Debug ETL repo value
        shell: bash
        run: |
          echo "PDB_ETL_REPOSITORY=${{ vars.PDB_ETL_REPOSITORY }}"

      - name: Preflight check ETL repo access
        shell: bash
        run: |
          set -euo pipefail

          status=$(curl -s -o /tmp/repo_check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.PDB_REPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ vars.PDB_ETL_REPOSITORY }}")

          echo "GitHub API repo check HTTP status: $status"

          if [ "$status" != "200" ]; then
            echo "::error::PAT cannot access repo ${{ vars.PDB_ETL_REPOSITORY }}"
            cat /tmp/repo_check.json
            exit 1
          fi

          cat /tmp/repo_check.json

      - name: Checkout PDB-etl
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PDB_ETL_REPOSITORY }}
          token: ${{ secrets.PDB_REPO_PAT }}
          path: pdb-etl
          fetch-depth: 1

      - name: Verify checkouts
        shell: bash
        run: |
          set -euo pipefail
          pwd
          ls -la
          echo "--- pdb-pipeline ---"
          ls -la pdb-pipeline
          echo "--- pdb-etl ---"
          ls -la pdb-etl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r pdb-pipeline/requirements.txt
          pip install -r pdb-etl/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run daily web/company orchestrator
        shell: bash
        run: |
          set -euo pipefail

          cd pdb-pipeline

          EXPANSION_LIMIT="${WEB_EXPANSION_LIMIT:-100}"
          CONTACT_LIMIT="${WEB_CONTACT_LIMIT:-250}"

          python -u -m runners.run_web_company_end_to_end \
            --trigger github_actions_schedule \
            --expansion-limit "${EXPANSION_LIMIT}" \
            --contact-limit "${CONTACT_LIMIT}" \
            --metrics-json-out web_run_metrics.json | tee web_run.log

      - name: Build run summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          metrics_path = Path("pdb-pipeline/web_run_metrics.json")

          with open(summary_path, "a", encoding="utf-8") as out:
              out.write("## Daily Web Company Run\n\n")

              if not metrics_path.exists():
                  out.write("No metrics file was produced.\n")
                  raise SystemExit(0)

              data = json.loads(metrics_path.read_text(encoding="utf-8"))

              out.write(f"- Run ID: `{data.get('run_id')}`\n")
              out.write(f"- Dataset ID: `{data.get('dataset_id')}`\n")
              out.write(f"- Status: `{data.get('status')}`\n")
              out.write(f"- Raw records ingested: `{data.get('raw_records_ingested')}`\n")
              out.write(f"- Companies seeded: `{data.get('companies_seeded')}`\n")
              out.write(f"- Companies enriched: `{data.get('companies_enriched')}`\n")
              out.write(f"- Contacts found: `{data.get('contacts_found')}`\n")
              out.write(f"- Leads inserted: `{data.get('leads_inserted')}`\n")
              out.write(f"- Sellable leads inserted: `{data.get('sellable_leads_inserted')}`\n")
              out.write(f"- Premium leads inserted: `{data.get('premium_leads_inserted')}`\n")
              out.write(f"- Total elapsed seconds: `{data.get('elapsed_seconds_total')}`\n\n")
          PY

      - name: Enforce alert conditions
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          from pathlib import Path

          metrics_path = Path("pdb-pipeline/web_run_metrics.json")
          if not metrics_path.exists():
              raise SystemExit("pdb-pipeline/web_run_metrics.json was not created")

          data = json.loads(metrics_path.read_text(encoding="utf-8"))

          if str(data.get("status")).lower() != "completed":
              raise SystemExit(f"Run status is not completed: {data.get('status')}")
          PY

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-web-company-run-artifacts
          if-no-files-found: ignore
          path: |
            pdb-pipeline/web_run.log
            pdb-pipeline/web_run_metrics.json