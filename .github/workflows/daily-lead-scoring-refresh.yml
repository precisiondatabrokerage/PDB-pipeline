name: Daily Lead Scoring Refresh

on:
  schedule:
    - cron: "45 14 * * *"
  workflow_dispatch:
    inputs:
      refresh_limit:
        description: "Maximum number of existing leads/companies to refresh"
        required: false
        default: "500"
      stale_days:
        description: "Only refresh records not scored/refreshed in this many days"
        required: false
        default: "14"

concurrency:
  group: daily-lead-scoring-refresh
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_ENV: production
  SUPABASE_POSTGRES_URL: ${{ secrets.SUPABASE_POSTGRES_URL }}
  MONGODB_URI: ${{ secrets.MONGODB_URI }}
  MONGODB_DB: ${{ secrets.MONGODB_DB }}
  REFRESH_LIMIT: ${{ github.event.inputs.refresh_limit || vars.LEAD_SCORING_REFRESH_LIMIT || '500' }}
  STALE_DAYS: ${{ github.event.inputs.stale_days || vars.LEAD_SCORING_STALE_DAYS || '14' }}

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      - name: Validate workflow configuration
        shell: bash
        run: |
          set -euo pipefail

          missing=0

          if [ -z "${{ vars.PDB_ETL_REPOSITORY }}" ]; then
            echo "::error::Missing repository variable PDB_ETL_REPOSITORY"
            missing=1
          fi

          if [ -z "${{ secrets.PDB_REPO_PAT }}" ]; then
            echo "::error::Missing secret PDB_REPO_PAT"
            missing=1
          fi

          if [ -z "${SUPABASE_POSTGRES_URL:-}" ]; then
            echo "::error::Missing secret SUPABASE_POSTGRES_URL"
            missing=1
          fi

          if [ -z "${MONGODB_URI:-}" ]; then
            echo "::error::Missing secret MONGODB_URI"
            missing=1
          fi

          if [ -z "${MONGODB_DB:-}" ]; then
            echo "::error::Missing secret MONGODB_DB"
            missing=1
          fi

          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Debug refresh configuration
        shell: bash
        run: |
          echo "PDB_ETL_REPOSITORY=${{ vars.PDB_ETL_REPOSITORY }}"
          echo "REFRESH_LIMIT=${REFRESH_LIMIT}"
          echo "STALE_DAYS=${STALE_DAYS}"

      - name: Preflight check ETL repo access
        shell: bash
        run: |
          set -euo pipefail

          status=$(curl -s -o /tmp/repo_check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.PDB_REPO_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ vars.PDB_ETL_REPOSITORY }}")

          echo "GitHub API repo check HTTP status: $status"

          if [ "$status" != "200" ]; then
            echo "::error::PAT cannot access repo ${{ vars.PDB_ETL_REPOSITORY }}"
            cat /tmp/repo_check.json
            exit 1
          fi

      - name: Checkout PDB-etl
        uses: actions/checkout@v4
        with:
          repository: ${{ vars.PDB_ETL_REPOSITORY }}
          token: ${{ secrets.PDB_REPO_PAT }}
          path: pdb-etl
          fetch-depth: 1

      - name: Verify checkout
        shell: bash
        run: |
          set -euo pipefail
          pwd
          ls -la
          echo "--- pdb-etl ---"
          ls -la pdb-etl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ETL dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r pdb-etl/requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run daily lead scoring refresh
        shell: bash
        working-directory: pdb-etl
        run: |
          set -euo pipefail

          mkdir -p artifacts

          python - <<'PY'
          import importlib.util
          import sys

          module_name = "runners.run_daily_lead_scoring_refresh"
          spec = importlib.util.find_spec(module_name)

          if spec is None:
              print("::error::Missing ETL runner: runners.run_daily_lead_scoring_refresh")
              print("Create pdb-etl/runners/run_daily_lead_scoring_refresh.py before enabling this workflow.")
              sys.exit(1)

          print(f"Found ETL runner: {module_name}")
          PY

          python -u -m runners.run_daily_lead_scoring_refresh \
            --trigger github_actions_daily_lead_scoring_refresh \
            --refresh-limit "${REFRESH_LIMIT}" \
            --stale-days "${STALE_DAYS}" \
            --metrics-json-out artifacts/lead_scoring_refresh_metrics.json | tee artifacts/lead_scoring_refresh.log

      - name: Build refresh summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          summary_path = os.environ["GITHUB_STEP_SUMMARY"]
          metrics_path = Path("pdb-etl/artifacts/lead_scoring_refresh_metrics.json")

          with open(summary_path, "a", encoding="utf-8") as out:
              out.write("## Daily Lead Scoring Refresh\n\n")

              if not metrics_path.exists():
                  out.write("No metrics file was produced.\n")
                  raise SystemExit(0)

              data = json.loads(metrics_path.read_text(encoding="utf-8"))

              out.write(f"- Run ID: `{data.get('run_id')}`\n")
              out.write(f"- Status: `{data.get('status')}`\n")
              out.write(f"- Trigger: `{data.get('trigger')}`\n")
              out.write(f"- Refresh limit: `{data.get('refresh_limit')}`\n")
              out.write(f"- Stale days: `{data.get('stale_days')}`\n")
              out.write(f"- Records considered: `{data.get('records_considered')}`\n")
              out.write(f"- Records refreshed: `{data.get('records_refreshed')}`\n")
              out.write(f"- Companies refreshed: `{data.get('companies_refreshed')}`\n")
              out.write(f"- Leads refreshed: `{data.get('leads_refreshed')}`\n")
              out.write(f"- Score increases: `{data.get('score_increases')}`\n")
              out.write(f"- Score decreases: `{data.get('score_decreases')}`\n")
              out.write(f"- Newly sellable: `{data.get('newly_sellable')}`\n")
              out.write(f"- Newly premium: `{data.get('newly_premium')}`\n")
              out.write(f"- Contact forms found: `{data.get('contact_forms_found')}`\n")
              out.write(f"- Emails found: `{data.get('emails_found')}`\n")
              out.write(f"- Phones confirmed: `{data.get('phones_confirmed')}`\n")
              out.write(f"- Errors: `{data.get('errors')}`\n")
              out.write(f"- Total elapsed seconds: `{data.get('elapsed_seconds_total')}`\n")
              out.write("\n")
          PY

      - name: Enforce refresh alert conditions
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          from pathlib import Path

          metrics_path = Path("pdb-etl/artifacts/lead_scoring_refresh_metrics.json")
          if not metrics_path.exists():
              raise SystemExit("pdb-etl/artifacts/lead_scoring_refresh_metrics.json was not created")

          data = json.loads(metrics_path.read_text(encoding="utf-8"))

          if str(data.get("status")).lower() != "completed":
              raise SystemExit(f"Lead scoring refresh status is not completed: {data.get('status')}")
          PY

      - name: Upload refresh artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-lead-scoring-refresh-artifacts
          if-no-files-found: ignore
          path: |
            pdb-etl/artifacts/lead_scoring_refresh.log
            pdb-etl/artifacts/lead_scoring_refresh_metrics.json