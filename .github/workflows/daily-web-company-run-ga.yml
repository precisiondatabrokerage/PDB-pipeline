name: Daily Web Company Run - GA Small Batch

on:
  schedule:
    - cron: "15 18 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    uses: ./.github/workflows/_web-company-run-reusable.yml
    with:
      run_name: "Daily Web Company Run - GA Small Batch"
      trigger_name: "github_actions_ga_small_batch"
      active_state: "GA"
      active_pack: "home_services"
      active_market_slugs: "atlanta-ga,augusta-ga,columbus-ga,macon-ga,savannah-ga"
      active_max_query_pairs: "45"
      expansion_limit: "30"
      contact_limit: "75"
      artifact_name: "ga-small-batch-web-company-run-artifacts"
    secrets: inherit